name: Build iOS

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    branches:
      - master

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund 2>&1 || npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build Angular
        run: npm run build

      - name: Sync iOS
        run: npx cap sync ios

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Build and Archive
        run: |
          cd ios/App
          set -o pipefail
          xcodebuild clean archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO || true

      - name: Export IPA
        run: |
          mkdir -p /tmp/export_options
          cat > /tmp/export_options/options.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>thinning</key>
              <string>&lt;none&gt;</string>
          </dict>
          </plist>
          PLIST

          cd ios/App/build
          if [ -d "App.xcarchive" ]; then
            xcodebuild -exportArchive \
              -archivePath App.xcarchive \
              -exportOptionsPlist /tmp/export_options/options.plist \
              -exportPath ipa || echo "Export step skipped"
          fi

      - name: Create fallback IPA if needed
        run: |
          cd ios/App/build
          mkdir -p ipa/Payload

          if [ ! -f "ipa/App.ipa" ]; then
            if [ -d "App.xcarchive/Products/Applications/App.app" ]; then
              cp -r App.xcarchive/Products/Applications/App.app ipa/Payload/ 2>/dev/null || true
              if [ -d "ipa/Payload/App.app" ]; then
                cd ipa
                zip -r App.ipa Payload/
                cd ../..
                echo "Fallback IPA created"
              fi
            fi
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: App.ipa
          path: ios/App/build/ipa/App.ipa
          if-no-files-found: warn

      - name: Job Summary
        if: always()
        run: |
          echo "## 🍎 iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Completed" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${{ inputs.build_type || 'push-trigger' }}" >> $GITHUB_STEP_SUMMARY

          if [ -f "ios/App/build/ipa/App.ipa" ]; then
            SIZE=$(ls -lh ios/App/build/ipa/App.ipa | awk '{print $5}')
            echo "**IPA Size:** $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "✅ **IPA Generated Successfully**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **No IPA file found** - Check logs for details" >> $GITHUB_STEP_SUMMARY
          fi
